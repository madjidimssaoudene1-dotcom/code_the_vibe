<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PC Parts Gallery</title>

<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
    <h2>PC Parts Store</h2>
    <button id="toggleTheme">change Theme</button>
</header>

<section class="gallery">

    <!-- CPU -->
    <div class="card">
    <img src="https://i.pinimg.com/1200x/03/52/1b/03521b5227a18f94bf4f84de4ee19ab7.jpg" />
    <div class="card-content">
        <h3>Intel Core i7</h3>
        <p>High-performance processor for gaming and multitasking.</p>
        <div class="price">$320</div>
    </div>
    </div>

    <!-- GPU -->
    <div class="card">
    <img src="https://images.unsplash.com/photo-1591488320449-011701bb6704?w=600" />
    <div class="card-content">
        <h3>NVIDIA RTX 4070</h3>
        <p>Powerful graphics card for ultra gaming experience.</p>
        <div class="price">$599</div>
    </div>
    </div>

    <!-- RAM -->
    <div class="card">
    <img src="https://images.unsplash.com/photo-1562976540-1502c2145186?w=600" />
    <div class="card-content">
        <h3>16GB DDR4 RAM</h3>
        <p>Fast and reliable memory for smooth performance.</p>
        <div class="price">$89</div>
    </div>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
